{% extends "base.html" %}
{% block content %}
<h1>{{ quiz.title }}</h1>
<form method="POST">
    {% csrf_token %}
    {% for question in quiz.questions.all %}
    <div>
        <p>{{ question.text }}</p>
        {% for option in question.options.all %}
        <label>
            <input type="radio" name="question_{{ question.id }}" value="{{ option.id }}">
            {{ option.text }}
        </label>
        {% endfor %}
    </div>
    {% endfor %}
    <button type="submit">Submit</button>
</form>
{% endblock content %}
